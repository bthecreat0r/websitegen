<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Dashboard — Website Generator</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;color:#111}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.login-card{background:#fff;border:1px solid #e8e8e8;border-radius:14px;padding:36px;width:100%;max-width:360px}
.login-card h1{font-size:20px;font-weight:600;margin-bottom:6px}
.login-card p{font-size:14px;color:#666;margin-bottom:24px}
.login-card input{width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;outline:none;margin-bottom:12px}
.login-card input:focus{border-color:#1a6fcf}
.btn-primary{width:100%;background:#1a6fcf;color:#fff;border:none;border-radius:8px;padding:11px;font-size:14px;cursor:pointer;font-weight:500}
.btn-primary:hover{background:#1558a8}
.err{color:#dc2626;font-size:13px;margin-top:8px}
.dash{display:none}
.topbar{background:#fff;border-bottom:1px solid #e8e8e8;padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between}
.topbar h1{font-size:17px;font-weight:600}
.topbar button{font-size:13px;color:#666;background:none;border:1px solid #ddd;border-radius:6px;padding:6px 14px;cursor:pointer}
.main{display:grid;grid-template-columns:320px 1fr;height:calc(100vh - 56px)}
.sidebar{border-right:1px solid #e8e8e8;background:#fff;overflow-y:auto}
.sidebar-top{padding:16px;border-bottom:1px solid #eee;font-size:12px;color:#888;font-weight:500;text-transform:uppercase;letter-spacing:.06em}
.sub-item{padding:16px;border-bottom:1px solid #f0f0f0;cursor:pointer;transition:background .15s}
.sub-item:hover{background:#fafafa}
.sub-item.active{background:#f0f4ff}
.sub-item h3{font-size:14px;font-weight:600;margin-bottom:3px}
.sub-item p{font-size:12px;color:#888}
.sub-item .status{display:inline-block;font-size:11px;padding:2px 8px;border-radius:99px;font-weight:500;margin-top:5px}
.status-pending{background:#fff8e1;color:#b45309}
.status-reviewed{background:#e8f5e9;color:#2e7d32}
.status-sent{background:#e8f0fd;color:#1a6fcf}
.status-published{background:#f3e8ff;color:#7c3aed}
.content{overflow-y:auto;background:#f5f5f3;padding:24px}
.empty-state{text-align:center;padding:80px 24px;color:#aaa}
.empty-state h3{font-size:16px;margin-bottom:6px;color:#666}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.info-card{background:#fff;border:1px solid #e8e8e8;border-radius:12px;padding:16px}
.info-card h4{font-size:12px;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px}
.info-row{display:flex;justify-content:space-between;font-size:13px;padding:5px 0;border-bottom:1px solid #f5f5f3}
.info-row:last-child{border:none}
.info-row span:first-child{color:#888}
.info-row span:last-child{font-weight:500;text-align:right;max-width:60%}
.preview-card{background:#fff;border:1px solid #e8e8e8;border-radius:12px;overflow:hidden;margin-bottom:16px}
.preview-bar{background:#f5f5f3;padding:8px 14px;display:flex;gap:6px;align-items:center;border-bottom:1px solid #e8e8e8}
.dot{width:10px;height:10px;border-radius:50%}
.preview-card iframe{width:100%;height:480px;border:none;display:block}
.action-row{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.btn-action{padding:9px 18px;border-radius:8px;font-size:13px;cursor:pointer;font-weight:500;border:1px solid #ddd;background:#fff;color:#333;transition:all .15s}
.btn-action:hover{background:#f5f5f3}
.btn-action.primary{background:#1a6fcf;color:#fff;border-color:#1a6fcf}
.btn-action.primary:hover{background:#1558a8}
.btn-action.success{background:#16a34a;color:#fff;border-color:#16a34a}
.btn-action.success:hover{background:#15803d}
.status-select{padding:9px 12px;border-radius:8px;font-size:13px;border:1px solid #ddd;background:#fff;color:#333;cursor:pointer}
.testimonials-section{background:#fff;border:1px solid #e8e8e8;border-radius:12px;padding:16px;margin-bottom:16px}
.testimonials-section h4{font-size:12px;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px}
.t-item{background:#f9f9f7;border-radius:8px;padding:10px;margin-bottom:8px;font-size:13px}
.t-item strong{display:block;margin-bottom:3px}
.t-item span{color:#888;font-size:12px}
.code-section{background:#fff;border:1px solid #e8e8e8;border-radius:12px;padding:16px;margin-bottom:16px}
.code-section h4{font-size:12px;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.code-box{background:#f5f5f3;border-radius:8px;padding:12px;font-size:11px;font-family:monospace;line-height:1.6;color:#555;max-height:160px;overflow-y:auto;white-space:pre-wrap;word-break:break-all}
</style>
</head>
<body>

<div class="login-wrap" id="login-wrap">
  <div class="login-card">
    <h1>Dashboard login</h1>
    <p>Enter your password to access submissions.</p>
    <input type="password" id="pw-input" placeholder="Password" onkeydown="if(event.key==='Enter')login()"/>
    <button class="btn-primary" onclick="login()">Sign in</button>
    <p class="err" id="login-err"></p>
  </div>
</div>

<div class="dash" id="dash">
  <div class="topbar">
    <h1>Website submissions</h1>
    <button onclick="logout()">Sign out</button>
  </div>
  <div class="main">
    <div class="sidebar">
      <div class="sidebar-top">Submissions</div>
      <div id="sub-list"></div>
    </div>
    <div class="content" id="content">
      <div class="empty-state">
        <h3>Select a submission</h3>
        <p>Choose a client from the list to review their website.</p>
      </div>
    </div>
  </div>
</div>

<script>
const BACKEND = window.BACKEND_URL || "https://websitegen-ezz0.onrender.com";
let token = localStorage.getItem("dash_token") || "";
let submissions = [];
let activeId = null;

const statusLabels = {
  pending_review: "Pending review",
  reviewed: "Reviewed",
  sent_to_client: "Sent to client",
  published: "Published"
};

async function login() {
  const pw = document.getElementById("pw-input").value;
  const res = await fetch(BACKEND + "/api/dashboard/auth", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ password: pw })
  });
  const data = await res.json();
  if (data.success) {
    token = data.token;
    localStorage.setItem("dash_token", token);
    showDash();
  } else {
    document.getElementById("login-err").textContent = "Incorrect password. Try again.";
  }
}

function logout() {
  localStorage.removeItem("dash_token");
  token = "";
  document.getElementById("login-wrap").style.display = "flex";
  document.getElementById("dash").style.display = "none";
}

async function showDash() {
  document.getElementById("login-wrap").style.display = "none";
  document.getElementById("dash").style.display = "block";
  await loadSubmissions();
}

async function loadSubmissions() {
  const res = await fetch(BACKEND + "/api/submissions", {
    headers: { "x-dashboard-token": token }
  });
  if (res.status === 401) { logout(); return; }
  submissions = await res.json();
  renderList();
}

function renderList() {
  const el = document.getElementById("sub-list");
  if (!submissions.length) {
    el.innerHTML = '<div style="padding:24px;text-align:center;font-size:13px;color:#aaa">No submissions yet.</div>';
    return;
  }
  el.innerHTML = submissions.map(s => {
    const d = new Date(s.submittedAt);
    const date = d.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
    const statusClass = "status-" + s.status.replace(/_/g, "-").replace("pending-review","pending");
    return `
      <div class="sub-item${s.id === activeId ? " active" : ""}" onclick="openSub('${s.id}')">
        <h3>${s.formData.name || "Unnamed"}</h3>
        <p>${s.formData.type || "Business"} · ${s.formData.city || ""}</p>
        <p style="font-size:11px;color:#bbb;margin-top:3px">${date}</p>
        <span class="status ${statusClass}">${statusLabels[s.status] || s.status}</span>
      </div>`;
  }).join("");
}

async function openSub(id) {
  activeId = id;
  renderList();
  const sub = submissions.find(s => s.id === id);
  if (!sub) return;
  const fd = sub.formData;
  const addr = [fd.street, fd.city, fd.state, fd.zip].filter(Boolean).join(", ");

  const testHtml = (fd.testimonials && fd.testimonials.length)
    ? fd.testimonials.map(t => `
        <div class="t-item">
          <strong>${t.name} — ${t.rating}/5 stars</strong>
          <span>${t.text}</span>
        </div>`).join("")
    : '<p style="font-size:13px;color:#aaa">No testimonials provided.</p>';

  document.getElementById("content").innerHTML = `
    <div style="max-width:900px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
        <div>
          <h2 style="font-size:20px;font-weight:600">${fd.name}</h2>
          <p style="font-size:13px;color:#888;margin-top:3px">${fd.type} · Submitted ${new Date(sub.submittedAt).toLocaleDateString()}</p>
        </div>
        <select class="status-select" onchange="updateStatus('${id}',this.value)">
          <option value="pending_review"${sub.status==="pending_review"?" selected":""}>Pending review</option>
          <option value="reviewed"${sub.status==="reviewed"?" selected":""}>Reviewed</option>
          <option value="sent_to_client"${sub.status==="sent_to_client"?" selected":""}>Sent to client</option>
          <option value="published"${sub.status==="published"?" selected":""}>Published</option>
        </select>
      </div>

      <div class="action-row">
        <button class="btn-action primary" onclick="downloadSite('${id}')">Download HTML</button>
        <button class="btn-action" onclick="copyHtml('${id}')">Copy HTML</button>
        <button class="btn-action success" onclick="markPublished('${id}')">Mark as published</button>
      </div>

      <div class="preview-card">
        <div class="preview-bar">
          <div class="dot" style="background:#ff5f57"></div>
          <div class="dot" style="background:#febc2e"></div>
          <div class="dot" style="background:#28c840"></div>
          <span style="font-size:12px;color:#aaa;margin-left:10px;flex:1;text-align:center">${fd.name} — preview</span>
        </div>
        <iframe id="preview-frame-${id}"></iframe>
      </div>

      <div class="detail-grid">
        <div class="info-card">
          <h4>Contact info</h4>
          <div class="info-row"><span>Phone</span><span>${fd.phone || "—"}</span></div>
          <div class="info-row"><span>Email</span><span>${fd.email || "—"}</span></div>
          <div class="info-row"><span>Address</span><span>${addr || "—"}</span></div>
          <div class="info-row"><span>Hours</span><span>${fd.hours || "—"}</span></div>
          <div class="info-row"><span>Social</span><span>${fd.social || "—"}</span></div>
        </div>
        <div class="info-card">
          <h4>Website details</h4>
          <div class="info-row"><span>Goals</span><span>${fd.goals || "—"}</span></div>
          <div class="info-row"><span>Style</span><span>${fd.stylePrefs || "—"}</span></div>
          <div class="info-row"><span>Brand color</span><span><span style="display:inline-block;width:12px;height:12px;border-radius:50%;background:${fd.color};vertical-align:middle;margin-right:4px"></span>${fd.color}</span></div>
          <div class="info-row"><span>Sections</span><span>${fd.sections || "—"}</span></div>
          <div class="info-row"><span>Photos</span><span>${fd.photoCount || 0} uploaded</span></div>
        </div>
        <div class="info-card">
          <h4>Business info</h4>
          <div class="info-row"><span>Type</span><span>${fd.type || "—"}</span></div>
          <div class="info-row"><span>Service area</span><span>${fd.area || "—"}</span></div>
          <div class="info-row"><span>Pricing</span><span>${fd.pricing || "—"}</span></div>
          <div class="info-row"><span>Has logo</span><span>${fd.hasLogo ? "Yes" : "No"}</span></div>
        </div>
        <div class="info-card">
          <h4>Customer & description</h4>
          <p style="font-size:13px;color:#444;line-height:1.5">${fd.desc || fd.customer || "—"}</p>
        </div>
      </div>

      <div class="testimonials-section">
        <h4>Testimonials</h4>
        ${testHtml}
      </div>

      <div class="code-section">
        <h4>Generated HTML (first 1500 chars)</h4>
        <div class="code-box">${escHtml(sub.generatedHtml || "").substring(0, 1500)}...</div>
      </div>
    </div>
  `;

  const blob = new Blob([sub.generatedHtml || ""], { type: "text/html" });
  document.getElementById(`preview-frame-${id}`).src = URL.createObjectURL(blob);
}

function escHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

async function updateStatus(id, status) {
  await fetch(BACKEND + "/api/submissions/" + id + "/status", {
    method: "PATCH",
    headers: { "Content-Type": "application/json", "x-dashboard-token": token },
    body: JSON.stringify({ status })
  });
  const sub = submissions.find(s => s.id === id);
  if (sub) sub.status = status;
  renderList();
}

function downloadSite(id) {
  const sub = submissions.find(s => s.id === id);
  if (!sub) return;
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([sub.generatedHtml], { type: "text/html" }));
  a.download = (sub.formData.name || "website").replace(/\s+/g, "-").toLowerCase() + ".html";
  a.click();
}

function copyHtml(id) {
  const sub = submissions.find(s => s.id === id);
  if (!sub) return;
  navigator.clipboard.writeText(sub.generatedHtml);
  alert("HTML copied to clipboard!");
}

function markPublished(id) {
  updateStatus(id, "published");
  const el = document.querySelector(".status-select");
  if (el) el.value = "published";
}

if (token) showDash();
</script>
</body>
</html>
